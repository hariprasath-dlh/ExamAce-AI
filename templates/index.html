<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExamAce AI – Smart Answer Enhancer</title>
    <!-- Use Bootstrap for clean & modern UI -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Markdown to HTML converter -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body class="bg-light">
    <!-- Navbar -->
    <nav class="navbar navbar-dark bg-primary shadow-sm mb-4" style="background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%) !important;">
        <div class="container">
            <span class="navbar-brand mb-0 h1 d-flex align-items-center fw-bold">
                <span class="fs-3 me-2">📝</span> ExamAce AI
                <span class="badge bg-light text-primary ms-2 fs-6 rounded-pill">Smart Enhancer</span>
            </span>
        </div>
    </nav>

    <div class="container main-container">
        <div class="row layout-row">
            <!-- Input Section -->
            <div class="col-lg-6 mb-4 d-flex flex-column">
                <div class="card shadow-sm border-0 flex-grow-1">
                    <div class="card-body d-flex flex-column p-4">
                        <div class="d-flex align-items-center mb-1">
                            <span class="fs-4 me-2">✏️</span>
                            <h4 class="card-title text-dark fw-bold mb-0">Your Answer</h4>
                        </div>
                        <p class="text-muted small mb-3">Paste your exam answer below to get a structured, high-scoring version.</p>
                        
                        <div class="mb-3">
                            <label for="marksInput" class="form-label fw-bold text-dark mb-1">Enter Marks (2 to 20):</label>
                            <input type="number" id="marksInput" class="form-control bg-light focus-ring" min="2" max="20" placeholder="e.g. 5, 10, 16" required>
                        </div>
                        
                        <textarea id="studentAnswer" class="form-control flex-grow-1 mb-4 bg-light focus-ring" placeholder="E.g., Generative AI is a type of artificial intelligence..." style="resize: none;"></textarea>
                        
                        <button id="enhanceBtn" class="btn btn-primary btn-lg w-100 fw-bold shadow-sm transition-all d-flex align-items-center justify-content-center" onclick="enhanceAnswer()">
                            <span id="btnText">✨ Enhance Answer</span>
                            <span id="btnSpinner" class="spinner-border spinner-border-sm d-none ms-2" role="status" aria-hidden="true"></span>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Output Section -->
            <div class="col-lg-6 mb-4 d-flex flex-column">
                 <div class="card shadow-sm border-0 flex-grow-1">
                    <div class="card-body d-flex flex-column p-4">
                        <div class="d-flex align-items-center mb-1">
                            <span class="fs-4 me-2">🏆</span>
                            <h4 class="card-title text-success fw-bold mb-0">Aced Answer</h4>
                        </div>
                        <p class="text-muted small mb-3">Your enhanced 10/16 mark equivalent answer.</p>
                        
                        <div class="output-wrapper flex-grow-1 position-relative">
                            <div id="outputSection" class="output-box h-100 p-4 rounded bg-light border overflow-auto">
                                <div class="d-flex flex-column justify-content-center align-items-center h-100 text-muted opacity-50">
                                    <span class="fs-1 mb-2">📄</span>
                                    <p class="mb-0 text-center">Your enhanced answer will appear here...</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Error Toast -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="errorToast" class="toast align-items-center text-bg-danger border-0 shadow" role="alert" aria-live="assertive" aria-atomic="true">
            <div class="d-flex">
                <div class="toast-body fw-medium" id="errorMessage">
                    An error occurred.
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function enhanceAnswer() {
            const answerText = document.getElementById("studentAnswer").value.trim();
            const marksValue = document.getElementById("marksInput").value.trim();
            const enhanceBtn = document.getElementById("enhanceBtn");
            const btnText = document.getElementById("btnText");
            const btnSpinner = document.getElementById("btnSpinner");
            const outputSection = document.getElementById("outputSection");
            
            if (!marksValue) {
                showError("Please enter the marks (between 2 and 20).");
                document.getElementById("marksInput").focus();
                return;
            }
            
            const marksInt = parseInt(marksValue, 10);
            if (isNaN(marksInt) || marksInt < 2 || marksInt > 20) {
                showError("Marks must be between 2 and 20.");
                document.getElementById("marksInput").focus();
                return;
            }

            if (!answerText) {
                showError("Please enter your answer first.");
                document.getElementById("studentAnswer").focus();
                return;
            }

            // UI Loading state
            enhanceBtn.disabled = true;
            btnText.textContent = "Enhancing...";
            btnSpinner.classList.remove("d-none");
            outputSection.innerHTML = `
                <div class="d-flex flex-column justify-content-center align-items-center h-100">
                    <div class="spinner-border text-primary mb-3" style="width: 3rem; height: 3rem;" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="text-primary fw-medium animate-pulse">Analyzing and structuring your answer...</p>
                </div>
            `;

            try {
                const response = await fetch('/api/enhance', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ answer: answerText, marks: marksInt })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "An error occurred while enhancing.");
                }

                // AI Response
                let resultText = data.enhanced_answer;
                
                if (resultText.startsWith("Error:")) {
                    outputSection.innerHTML = `
                        <div class="alert alert-danger d-flex align-items-center" role="alert">
                            <div>${resultText}</div>
                        </div>`;
                } else {
                    // Set markdown options
                    marked.setOptions({
                        breaks: true,
                        gfm: true
                    });
                    outputSection.innerHTML = marked.parse(resultText);
                    
                    // Add copy button logic if needed later
                }
                
            } catch (error) {
                showError(error.message);
                outputSection.innerHTML = `
                    <div class="d-flex flex-column justify-content-center align-items-center h-100 text-danger opacity-75">
                        <span class="fs-1 mb-2">⚠️</span>
                        <p class="mb-0 text-center fw-medium">Failed to enhance the answer.</p>
                        <p class="small text-center mt-2">${error.message}</p>
                    </div>`;
            } finally {
                // Restore UI state
                enhanceBtn.disabled = false;
                btnText.textContent = "✨ Enhance Answer";
                btnSpinner.classList.add("d-none");
            }
        }

        function showError(message) {
            document.getElementById("errorMessage").textContent = message;
            const toast = new bootstrap.Toast(document.getElementById("errorToast"));
            toast.show();
        }
    </script>
</body>
</html>
